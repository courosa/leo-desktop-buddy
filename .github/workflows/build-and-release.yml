name: Build and release Windows app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pyinstaller --noconfirm --clean LeoDesktopBuddy.spec
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Leo Desktop Buddy v1.0.0
          body: |
            A playful Windows desktop companion made for Leo.

            Download `LeoDesktopBuddy.exe`, double-click it to start, and use
            the blue system-tray icon to exit.
          files: dist/LeoDesktopBuddy.exe

